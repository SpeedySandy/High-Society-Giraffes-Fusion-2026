<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f0f1e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">
  <link rel="manifest" href="#" id="manifest-link">
  <title>Fusion 2026</title>
  <style>
    :root {
      --bg: #0f0f1e;
      --surface: #1a1a2e;
      --surface2: #2a2a4e;
      --border: #3a3a6a;
      --gold: #e8c96a;
      --magenta: #c84b6a;
      --teal: #4bc8a0;
      --violet: #7a4bc8;
      --orange: #e87a3a;
      --text: #f0ece0;
      --muted: #9090b0;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;
      font-weight: 400;
      min-height: 100vh;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.05  0 0 0 0 0.05  0 0 0 0 0.12  0 0 0 0.35 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>");
      background-attachment: fixed;
      padding-bottom: 80px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .app-title {
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--gold);
      margin: 0;
    }

    .app-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin: 2px 0 0;
    }

    .lang-switcher {
      display: flex;
      gap: 2px;
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .lang-btn:hover { color: var(--text); }

    .lang-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    main {
      padding: 20px;
      max-width: 720px;
      margin: 0 auto;
    }

    section[id^="tab-"] { display: none; }
    section[id^="tab-"].active { display: block; }

    .rule {
      border: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 20px 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 16px;
    }

    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 10;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 4px 12px;
      background: transparent;
      border: none;
      border-top: 2px solid transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .tab-btn.active {
      color: var(--gold);
      border-top-color: var(--gold);
    }

    .tab-btn:first-child { border-top-left-radius: 11px; }
    .tab-btn:last-child { border-top-right-radius: 11px; }
    .tab-btn:nth-child(2) { border-radius: 0; }

    .placeholder {
      color: var(--muted);
      font-style: italic;
      text-align: center;
      padding: 40px 0;
      border: 1px dashed var(--border);
      border-radius: 17px;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 class="app-title" data-i18n="app_title">Fusion 2026</h1>
      <p class="app-subtitle" data-i18n="app_subtitle">Festival companion</p>
    </div>
    <nav class="lang-switcher" aria-label="Language">
      <button class="lang-btn" data-lang="en" data-i18n="lang_en">EN</button>
      <button class="lang-btn" data-lang="es" data-i18n="lang_es">ES</button>
      <button class="lang-btn" data-lang="de" data-i18n="lang_de">DE</button>
    </nav>
  </header>

  <main>
    <section id="tab-home" class="active">
      <p class="placeholder">Coming in next stage</p>
    </section>
    <section id="tab-info">
      <p class="placeholder">Coming in next stage</p>
    </section>
    <section id="tab-camp">
      <p class="placeholder">Coming in next stage</p>
    </section>
  </main>

  <nav class="tab-bar" aria-label="Primary">
    <button class="tab-btn active" data-tab="tab-home">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>
      <span data-i18n="nav_home">Home</span>
    </button>
    <button class="tab-btn" data-tab="tab-info">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8h.01"/><path d="M11 12h1v5h1"/></svg>
      <span data-i18n="nav_info">Info</span>
    </button>
    <button class="tab-btn" data-tab="tab-camp">
      <svg viewBox="0 0 24 24"><path d="M3 21L12 4l9 17"/><path d="M3 21h18"/><path d="M12 4v17"/></svg>
      <span data-i18n="nav_camp">Camp</span>
    </button>
  </nav>

  <script>
    const translations = {
      en: {
        nav_home: "Home",
        nav_info: "Info",
        nav_camp: "Camp",
        app_title: "Fusion 2026",
        app_subtitle: "Festival companion",
        lang_en: "EN",
        lang_es: "ES",
        lang_de: "DE"
      },
      es: {
        nav_home: "Inicio",
        nav_info: "Info",
        nav_camp: "Camping",
        app_title: "Fusion 2026",
        app_subtitle: "Compañero del festival",
        lang_en: "EN",
        lang_es: "ES",
        lang_de: "DE"
      },
      de: {
        nav_home: "Start",
        nav_info: "Info",
        nav_camp: "Camp",
        app_title: "Fusion 2026",
        app_subtitle: "Festival-Begleiter",
        lang_en: "EN",
        lang_es: "ES",
        lang_de: "DE"
      }
    };

    function applyLang(lang) {
      const dict = translations[lang] || translations.en;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key] !== undefined) el.textContent = dict[key];
      });
      document.documentElement.lang = lang;
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === lang);
      });
      localStorage.setItem('lang', lang);
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => applyLang(btn.dataset.lang));
    });

    const storedLang = localStorage.getItem('lang') || 'en';
    applyLang(storedLang);

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
        document.querySelectorAll('section[id^="tab-"]').forEach(s => {
          s.classList.toggle('active', s.id === target);
        });
      });
    });

    const manifest = {
      name: "Fusion 2026",
      short_name: "Fusion",
      theme_color: "#0f0f1e",
      background_color: "#0f0f1e",
      display: "standalone",
      start_url: "."
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

    if ('serviceWorker' in navigator) {
      const swSource = `
        const CACHE = 'fusion-2026-v1';
        const PAGE = self.location.origin + self.registration.scope;
        self.addEventListener('install', (e) => {
          e.waitUntil(caches.open(CACHE).then(c => c.add(PAGE)).catch(() => {}));
          self.skipWaiting();
        });
        self.addEventListener('activate', (e) => {
          e.waitUntil(self.clients.claim());
        });
        self.addEventListener('fetch', (e) => {
          if (e.request.method !== 'GET') return;
          e.respondWith(
            caches.match(e.request).then(hit => hit || fetch(e.request).then(res => {
              const copy = res.clone();
              caches.open(CACHE).then(c => c.put(e.request, copy)).catch(() => {});
              return res;
            }).catch(() => caches.match(PAGE)))
          );
        });
      `;
      const swBlob = new Blob([swSource], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  </script>
</body>
</html>
