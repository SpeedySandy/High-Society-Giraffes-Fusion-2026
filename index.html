<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IHA AI Roadshow – Online-Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <section class="hero card">
      <p class="eyebrow">IHA AI Roadshow 2026</p>
      <h1>Online KI-Quiz</h1>
      <p class="intro">Teste dein Wissen rund um Künstliche Intelligenz, Prompting, Datenschutz und den sinnvollen Einsatz von AI im Hospitality-Umfeld.</p>
      <div class="meta">
        <span>⏱️ ca. 4 Minuten</span>
        <span>🎯 10 Fragen</span>
        <span>🏆 Sofort-Auswertung</span>
      </div>
    </section>

    <section class="quiz card" id="quiz" aria-live="polite"></section>
  </main>

  <script>
    const quizData = [
      {
        question: "Wofür steht das Kürzel \"LLM\" im KI-Kontext?",
        options: ["Large Language Model", "Linked Learning Method", "Low Latency Machine", "Logical Language Matrix"],
        answer: 0,
        explanation: "LLM steht für Large Language Model – also ein großes Sprachmodell, das mit sehr vielen Textdaten trainiert wurde."
      },
      {
        question: "Welche Aussage beschreibt Prompting am besten?",
        options: ["Das physische Starten eines Servers", "Die Formulierung von Eingaben für ein KI-Modell", "Das Komprimieren von Bildern", "Das Prüfen von WLAN-Signalen"],
        answer: 1,
        explanation: "Prompting bedeutet, eine KI durch klare Eingaben (Prompts) zu steuern, damit sie passende Ergebnisse liefert."
      },
      {
        question: "Was ist ein zentrales Risiko beim Einsatz von generativer KI im Unternehmen?",
        options: ["Zu viele USB-Ports", "Unkontrollierte Weitergabe sensibler Daten", "Höhere Bildschirmhelligkeit", "Langsamere Mausbewegung"],
        answer: 1,
        explanation: "Wer vertrauliche Daten ungeprüft in KI-Tools eingibt, riskiert Datenschutz- und Compliance-Probleme."
      },
      {
        question: "Welche Maßnahme verbessert die Qualität von KI-Antworten typischerweise am meisten?",
        options: ["Lauter Tippen", "Möglichst kurze, unpräzise Fragen", "Klare Rolle, Kontext und gewünschtes Ergebnis im Prompt", "Mehr Tabs im Browser"],
        answer: 2,
        explanation: "Je klarer Rolle, Kontext, Ziel und Format definiert sind, desto präziser kann das Modell antworten."
      },
      {
        question: "Was bedeutet \"Halluzination\" bei KI-Systemen?",
        options: ["Die KI schaltet sich aus", "Die KI erzeugt überzeugende, aber falsche Inhalte", "Ein Grafikfehler im Browser", "Die Tastatur reagiert nicht"],
        answer: 1,
        explanation: "Halluzinationen sind erfundene Aussagen, die plausibel klingen, aber faktisch falsch sein können."
      },
      {
        question: "Welches Prinzip ist bei KI-Nutzung im Hotelbetrieb besonders wichtig?",
        options: ["Mehr Emojis in jeder E-Mail", "Datensparsamkeit und Zugriff nach dem Need-to-know-Prinzip", "Alle Daten in öffentliche Chats kopieren", "Passwörter im Team teilen"],
        answer: 1,
        explanation: "Datensparsamkeit hilft, Risiken zu reduzieren. Nur notwendige Daten und klar geregelte Zugriffe sind best practice."
      },
      {
        question: "Welcher Use Case ist ein gutes Beispiel für KI-Mehrwert in der Hotellerie?",
        options: ["Automatische Erstellung personalisierter Antwortentwürfe für Gästebewertungen", "Austausch der Brandschutzanlage", "Ersetzen aller Mitarbeitergespräche", "Abschalten des PMS"],
        answer: 0,
        explanation: "KI kann Teams unterstützen, schneller hochwertige Antworten zu erstellen – mit menschlicher Endkontrolle."
      },
      {
        question: "Warum sollte man KI-Ergebnisse grundsätzlich verifizieren?",
        options: ["Weil KI immer langsam ist", "Weil KI keine Umlaute versteht", "Weil Antworten fehlerhaft, veraltet oder verzerrt sein können", "Weil sonst das WLAN ausfällt"],
        answer: 2,
        explanation: "KI liefert Wahrscheinlichkeiten, keine garantierten Fakten. Deshalb sind Faktencheck und Plausibilitätsprüfung Pflicht."
      },
      {
        question: "Welche Formulierung ist der bessere Prompt für ein Management-Briefing?",
        options: ["Erzähl mal was über KI", "Schreibe ein 5-Punkte-Briefing für Hoteldirektoren: Chancen, Risiken, erste 30-Tage-Schritte, in sachlichem Ton", "KI", "Mach irgendwas Kreatives"],
        answer: 1,
        explanation: "Der zweite Prompt ist klar in Zielgruppe, Struktur, Inhalt und Tonalität – dadurch deutlich nützlicher."
      },
      {
        question: "Was ist ein sinnvoller erster Schritt für KI-Governance im Unternehmen?",
        options: ["Keine Regeln definieren", "Eine kurze KI-Richtlinie mit erlaubten Tools und Datennutzung erstellen", "Alle bestehenden Prozesse löschen", "Nur noch per Sprachnachricht kommunizieren"],
        answer: 1,
        explanation: "Eine pragmatische KI-Policy schafft Sicherheit: Welche Tools sind erlaubt, welche Daten tabu, wer gibt frei?"
      }
    ];

    const quizEl = document.getElementById('quiz');
    let current = 0;
    let score = 0;
    const selectedAnswers = [];

    function renderQuestion() {
      const item = quizData[current];
      quizEl.innerHTML = `
        <div class="progress-wrap">
          <p class="progress-label">Frage ${current + 1} von ${quizData.length}</p>
          <div class="progress"><span style="width:${((current) / quizData.length) * 100}%"></span></div>
        </div>
        <h2>${item.question}</h2>
        <div class="options">
          ${item.options.map((opt, i) => `
            <button class="option" data-index="${i}">${opt}</button>
          `).join('')}
        </div>
      `;

      quizEl.querySelectorAll('.option').forEach(btn => {
        btn.addEventListener('click', () => handleAnswer(Number(btn.dataset.index)));
      });
    }

    function handleAnswer(index) {
      selectedAnswers.push(index);
      const item = quizData[current];
      if (index === item.answer) score++;

      quizEl.innerHTML = `
        <p class="feedback ${index === item.answer ? 'ok' : 'bad'}">
          ${index === item.answer ? '✅ Richtig!' : '❌ Nicht ganz.'}
        </p>
        <p class="explanation">${item.explanation}</p>
        <button class="next">${current + 1 < quizData.length ? 'Weiter zur nächsten Frage' : 'Ergebnis anzeigen'}</button>
      `;

      quizEl.querySelector('.next').addEventListener('click', () => {
        current++;
        if (current < quizData.length) {
          renderQuestion();
        } else {
          renderResult();
        }
      });
    }

    function renderResult() {
      const pct = Math.round((score / quizData.length) * 100);
      let level = 'KI-Neuling';
      if (pct >= 80) level = 'KI-Champion';
      else if (pct >= 60) level = 'KI-Praktiker:in';
      else if (pct >= 40) level = 'KI-Entdecker:in';

      quizEl.innerHTML = `
        <h2>Dein Ergebnis</h2>
        <p class="result-score">${score} / ${quizData.length} richtig (${pct}%)</p>
        <p class="result-level">Level: <strong>${level}</strong></p>
        <p class="result-copy">Danke fürs Mitmachen beim <strong>IHA AI Roadshow</strong> Quiz. Nutze die Session, um konkrete KI-Anwendungsfälle für deinen Betrieb zu definieren.</p>
        <button class="restart">Nochmal spielen</button>
      `;

      quizEl.querySelector('.restart').addEventListener('click', () => {
        current = 0;
        score = 0;
        selectedAnswers.length = 0;
        renderQuestion();
      });
    }

    renderQuestion();
  </script>
</body>
</html>
